<!-- ========================= index.html (SHOP) ========================= -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tit.oder Shop</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:white;padding:10px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:10px}
.product{background:white;border-radius:8px;overflow:hidden}
.product img{width:100%;height:180px;object-fit:cover}
.price{color:red;font-weight:bold}
</style>
</head>
<body>
<header>
<b>tit.oder</b>
<a href="admin.html">Admin</a>
</header>
<div class="grid" id="products"></div>

<script>
let products = JSON.parse(localStorage.getItem('products'))||[];

function render(){
let html='';
products.forEach(p=>{
html+=`<div class='product'>
<img src='${p.img}'>
<p>${p.name}</p>
<p class='price'>${p.price}k</p>
</div>`;
});
document.getElementById('products').innerHTML=html;
}

render();
</script>
</body>
</html>
