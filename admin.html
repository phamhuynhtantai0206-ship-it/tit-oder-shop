<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - tit.oder</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:black;color:#fff;padding:10px}
.container{padding:10px}
input,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:8px}
.product{background:#fff;margin:5px;padding:10px}
</style>
</head>
<body>
<header>ADMIN - tit.oder</header>
<div class="container">
<h3>Đăng nhập</h3>
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">Login</button>

<div id="admin" style="display:none">
<h3>Thêm sản phẩm</h3>
<input id="name" placeholder="Tên">
<input id="price" placeholder="Giá">
<input id="img" placeholder="Link ảnh">
<textarea id="desc" placeholder="Mô tả"></textarea>
<button onclick="addProduct()">Thêm</button>

<h3>Danh sách</h3>
<div id="list"></div>
</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products'))||[];

function save(){localStorage.setItem('products',JSON.stringify(products))}

function login(){
if(user.value==='admin' && pass.value==='123'){
admin.style.display='block';
}
}

function addProduct(){
products.push({name:name.value,price:price.value||450,img:img.value,desc:desc.value});
save();render();
}

function render(){
let html='';
products.forEach(p=>{
html+=`<div class='product'>${p.name} - ${p.price}k</div>`;
});
list.innerHTML=html;
}

render();
</script>
</body>
</html>
