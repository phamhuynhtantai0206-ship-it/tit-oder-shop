<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{font-family:Arial;padding:10px}
input{margin:5px;padding:5px}
button{margin:5px}
.item{border:1px solid #ccc;padding:5px;margin:5px}
</style>
</head>
<body>

<h2>Admin - tit.oder</h2>

<input id="name" placeholder="Tên sản phẩm"><br>
<input id="price" placeholder="Giá"><br>
<input type="file" id="file"><br>

<button onclick="addProduct()">Thêm</button>

<h3>Danh sách sản phẩm</h3>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "tit-oder-shop.firebaseapp.com",
  projectId: "tit-oder-shop"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let imgData="";

// đọc ảnh
file.onchange = function(){
  let reader = new FileReader();
  reader.onload = e => imgData = e.target.result;
  reader.readAsDataURL(this.files[0]);
}

// thêm sản phẩm
window.addProduct = async ()=>{
  if(!name.value || !price.value || !imgData){
    alert("Nhập đầy đủ thông tin!");
    return;
  }

  await addDoc(collection(db,"products"),{
    name: name.value,
    price: price.value,
    img: imgData
  });

  alert("Đã thêm!");
  load();
}

// load + hiển thị
async function load(){
  let snap = await getDocs(collection(db,"products"));
  let html="";

  snap.forEach(d=>{
    let p = d.data();
    html+=`
    <div class="item">
      <img src="${p.img}" width="80"><br>
      ${p.name} - ${p.price}k
      <br>
      <button onclick="del('${d.id}')">Xóa</button>
    </div>`;
  });

  list.innerHTML = html;
}

// xóa sản phẩm
window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
}

load();
</script>

</body>
</html>
