<!-- ========================= admin.html (UPLOAD ẢNH TỪ MÁY) ========================= -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
body{font-family:Arial;padding:10px}
input,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:8px}
img{width:100px;margin-top:10px}
</style>
</head>
<body>
<h2>Admin</h2>
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">Login</button>

<div id="admin" style="display:none">
<h3>Thêm sản phẩm</h3>
<input id="name" placeholder="Tên">
<input id="price" placeholder="Giá">

<!-- chọn ảnh từ máy -->
<input type="file" id="file">
<img id="preview">

<textarea id="desc" placeholder="Mô tả"></textarea>
<button onclick="addProduct()">Thêm</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products'))||[];
let imageData = '';

function save(){localStorage.setItem('products',JSON.stringify(products))}

function login(){
if(user.value==='admin' && pass.value==='123'){
admin.style.display='block';
}
}

// đọc ảnh từ máy
file.onchange = function(){
let reader = new FileReader();
reader.onload = function(e){
imageData = e.target.result;
preview.src = imageData;
}
reader.readAsDataURL(this.files[0]);
}

function addProduct(){
products.push({name:name.value,price:price.value||450,img:imageData,desc:desc.value});
save();alert('Đã thêm sản phẩm');
}
</script>

</body>
</html>
