<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin - tit.oder</title>

<style>
body{font-family:Arial;padding:10px;background:#f5f5f5}
input{margin:5px;padding:5px;width:200px}
button{margin:5px;padding:5px}
.item{background:#fff;padding:10px;margin:10px 0;border-radius:8px}
img{width:80px}
</style>

</head>
<body>

<h2>🔧 Admin - tit.oder</h2>

<h3>Thêm sản phẩm</h3>
<input id="name" placeholder="Tên sản phẩm"><br>
<input id="price" placeholder="Giá"><br>
<input type="file" id="file"><br>

<button onclick="addProduct()">➕ Thêm</button>

<h3>Danh sách sản phẩm</h3>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRh8vou4l2QkII2yjaUSSkvEAKDR_M8-k",
  authDomain: "tit-oder-shop.firebaseapp.com",
  projectId: "tit-oder-shop"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let imgData = "";

// đọc ảnh
file.onchange = function(){
  let reader = new FileReader();
  reader.onload = e => imgData = e.target.result;
  reader.readAsDataURL(this.files[0]);
}

// thêm sản phẩm
window.addProduct = async ()=>{
  if(!name.value || !price.value || !imgData){
    alert("Nhập đầy đủ!");
    return;
  }

  await addDoc(collection(db,"products"),{
    name: name.value,
    price: price.value,
    img: imgData
  });

  alert("Đã thêm!");
  load();
}

// load danh sách
async function load(){
  let snap = await getDocs(collection(db,"products"));
  let html="";

  snap.forEach(d=>{
    let p=d.data();

    html+=`
    <div class="item">
      <img src="${p.img}"><br>
      <b>${p.name || "Chưa có tên"}</b><br>
      ${p.price || "0"}k<br>

      <button onclick="del('${d.id}')">❌ Xóa</button>
    </div>`;
  });

  list.innerHTML = html;
}

// xóa
window.del = async (id)=>{
  if(confirm("Bạn chắc muốn xóa?")){
    await deleteDoc(doc(db,"products",id));
    load();
  }
}

load();
</script>

</body>
</html>
